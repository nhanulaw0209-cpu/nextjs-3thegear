services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thegear_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-thegear_prod}
    volumes:
      - /var/lib/thegear_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5460:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thegear_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-thegear_prod}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      THEGEAR_NOTIFY_EMAIL: ${THEGEAR_NOTIFY_EMAIL}
    ports:
      - "127.0.0.1:3050:3000"
    volumes:
      - /var/www/3thegear-uploads:/app/public/uploads
